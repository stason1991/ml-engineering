{% extends "base.html" %}

{% block title %}Вход | Career Path Pro{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">Career Path Pro</h3>
                    <p class="text-muted">Вход в личный кабинет HR-аналитики</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Логин" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">ПАРОЛЬ</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Войти</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted">Нет аккаунта? <a href="{% url 'register' %}" class="text-decoration-none">Регистрация</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
