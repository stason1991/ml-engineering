{% extends "base.html" %}

{% block title %}Безопасность | Career Path Pro{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4">Изменение пароля</h5>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">ТЕКУЩИЙ ПАРОЛЬ</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <hr class="my-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">НОВЫЙ ПАРОЛЬ</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">ПОДТВЕРЖДЕНИЕ НОВОГО ПАРОЛЯ</label>
                        <input type="password" name="new_password_confirm" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning fw-bold">Обновить данные</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
