{% extends "base.html" %}

{% block title %}Регистрация | Career Path Pro{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary">Регистрация</h3>
                    <p class="text-muted">Создание нового профиля</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">ПРИДУМАЙТЕ ЛОГИН</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">ПАРОЛЬ</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">ПОВТОРИТЕ ПАРОЛЬ</label>
                        <input type="password" name="password_confirm" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Создать аккаунт</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="small text-muted">Уже есть аккаунт? <a href="{% url 'login' %}" class="text-decoration-none">Войти</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
